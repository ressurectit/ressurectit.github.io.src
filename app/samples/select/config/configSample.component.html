<div>Value: {{selectField().value() | json}}</div>

<div class="bold margin-top-small">DI provided options</div>

<ng-select [formField]="selectField">
    <ng-option value="first" text="First value text"/>
    <ng-option value="second" text="Second value text"/>
    <ng-option value="third" text="Third value text"/>
    <ng-option value="fourth" text="Fourth value text"/>
    <ng-option value="fifth" text="Fifth value text"/>
</ng-select>

<div class="bold margin-top-small">Locally overriden options</div>

<ng-select [formField]="selectField" [selectOptions]="selectOptions">
    <ng-option value="first" text="First value text"/>
    <ng-option value="second" text="Second value text"/>
    <ng-option value="third" text="Third value text"/>
    <ng-option value="fourth" text="Fourth value text"/>
    <ng-option value="fifth" text="Fifth value text"/>
</ng-select>

<div class="bold margin-top-small">All other select samples are using global DI provided options</div>
